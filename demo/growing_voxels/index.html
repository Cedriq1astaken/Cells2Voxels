<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cells2Voxels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=6">
</head>
<body>
  <header id="top-bar">
    <div class="top-stats" aria-label="Simulation readouts">
      <div class="stat-box"><span class="stat-label">FPS</span><span class="stat-val" id="stat-fps">-</span></div>
      <div class="stat-box"><span class="stat-label">STEP</span><span class="stat-val" id="stat-step">0</span></div>
      <div class="stat-box stat-wide"><span class="stat-label">VOXELS</span><span class="stat-val" id="stat-voxels">0</span></div>
      <div class="stat-box stat-chip"><span class="stat-label">GPU</span><span class="stat-val" id="stat-f16">-</span></div>
    </div>

    <div class="top-actions">
      <button id="btn-start-stop" class="top-btn is-primary" type="button">START</button>
      <button id="btn-reset" class="top-btn" type="button">RESET</button>
      <button id="btn-info" class="top-btn" type="button">INFO</button>
      <button id="btn-controls" class="top-btn is-active" type="button" aria-expanded="true">CONTROLS</button>
      <label class="model-picker">
        <span>MODEL</span>
        <select id="model-select"></select>
      </label>
    </div>
  </header>

  <div id="main-layout">
    <main id="canvas-container">
      <canvas id="canvas"></canvas>
    </main>

    <aside id="left-panel" aria-label="Simulation controls">
      <div class="panel-title-row">
        <span class="panel-title">Controls</span>
        <span id="val-model" class="panel-model">-</span>
      </div>

      <div class="panel-section">
        <label>DAMAGE RADIUS <span id="val-damage-radius" class="slider-val">2</span></label>
        <input type="range" id="slider-damage-radius" min="1" max="6" step="1" value="2">
      </div>

      <div class="panel-section">
        <label>SIMULATION RATE <span id="val-sim-rate" class="slider-val">0.25x</span></label>
        <input type="range" id="slider-sim-rate" min="0.25" max="2" step="0.25" value="0.25">
      </div>

      <div class="panel-section checkbox-section" style="display:flex; justify-content:space-between; align-items:center;">
        <label for="cb-perf-mode">CLEANER VISUALS</label>
        <input type="checkbox" id="cb-perf-mode" checked>
      </div>

      <div class="panel-section compact-section">
        <label>CROSS SECTION X <span id="val-cross-x" class="slider-val">84</span></label>
        <input type="range" id="slider-cross-x" min="1" max="92" step="1" value="92">
      </div>

      <div class="panel-section compact-section">
        <label>CROSS SECTION Y <span id="val-cross-y" class="slider-val">84</span></label>
        <input type="range" id="slider-cross-y" min="1" max="92" step="1" value="92">
      </div>

      <div class="panel-section compact-section">
        <label>CROSS SECTION Z <span id="val-cross-z" class="slider-val">84</span></label>
        <input type="range" id="slider-cross-z" min="1" max="92" step="1" value="92">
      </div>

      <div class="panel-section compact-section">
        <label>LPPN SCALE <span id="val-lppn-scale" class="slider-val">1.0</span></label>
        <input type="range" id="slider-lppn-scale" min="0.25" max="8.0" step="0.25" value="1.0">
      </div>

      <div class="panel-section compact-section">
        <label>ROTATE X <span id="val-rotate-x" class="slider-val">0 deg</span></label>
        <input type="range" id="slider-rotate-x" min="-180" max="180" step="1" value="0">
      </div>

      <div class="panel-section compact-section">
        <label>ROTATE Y <span id="val-rotate-y" class="slider-val">0 deg</span></label>
        <input type="range" id="slider-rotate-y" min="-180" max="180" step="1" value="0">
      </div>

      <div class="panel-section compact-section">
        <label>ROTATE Z <span id="val-rotate-z" class="slider-val">0 deg</span></label>
        <input type="range" id="slider-rotate-z" min="-180" max="180" step="1" value="0">
      </div>
    </aside>

    <div id="info-panel" class="hidden" aria-hidden="true">
      <div class="info-header">
        <h3>Model Info</h3>
        <button id="btn-close-info" type="button">CLOSE</button>
      </div>
      <table class="info-table">
        <tr><td>Channels</td><td id="info-channels">-</td></tr>
        <tr><td>Coarse Grid</td><td id="info-coarse">-</td></tr>
        <tr><td>Target Size</td><td id="info-target">-</td></tr>
        <tr><td>Scale Factor</td><td id="info-scale">-</td></tr>
        <tr><td>Train GPU</td><td id="info-gpu">-</td></tr>
      </table>
      <div class="info-images">
        <div>
          <span class="img-label">Original</span>
          <img id="img-original" alt="Original voxel model">
        </div>
        <div>
          <span class="img-label">Coarse NCA</span>
          <img id="img-coarse" alt="Coarse NCA state">
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="script/app.js?v=32"></script>
</body>
</html>
